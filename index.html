<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RACS HiPS Viewer (Aladin Lite + CDS registry)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #bar { display:flex; gap:10px; align-items:center; padding:10px 12px; border-bottom:1px solid #ddd; }
    #bar button { padding:6px 10px; }
    #status { margin-left:auto; opacity:0.8; font-size: 14px; }
    #aladin { width: 100vw; height: calc(100vh - 52px); }
    code { font-size: 13px; }
  </style>
</head>
<body>
  <div id="bar">
    <strong>RACS</strong>
    <button id="btnLow" disabled>Load low (887.5 MHz)</button>
    <button id="btnMid" disabled>Load mid (1367.5 MHz)</button>
    <button id="btnLowCat" disabled>Load low sources</button>
    <button id="btnMidCat" disabled>Load mid sources</button>
    <span id="status">Initializing…</span>
  </div>
  <div id="aladin"></div>

  <script src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js" charset="utf-8"></script>
  <script src="./app.js"></script>
</body>
</html>
