<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RACS HiPS Viewer (Aladin Lite + CDS registry)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #bar { display:flex; gap:10px; align-items:center; padding:8px 12px; border-bottom:1px solid #ddd; flex-wrap: wrap; font-size: 13px; }
    #bar button { padding:5px 9px; font-size: 13px; }
    #bar select { padding:3px 5px; font-size: 13px; }
    #bar input { font-size: 13px; }
    #status { margin-left:auto; opacity:0.8; }
    .sep { width:1px; height:24px; background:#ccc; }
    #aladin { width: 100vw; height: calc(100vh - 42px); position: relative; }
  </style>
</head>
<body>
  <div id="bar">
    <strong>RACS</strong>
    <button id="btnLoadImg" disabled>Load images</button>
    <select id="selImage" disabled>
      <option value="low">RACS-low (887.5 MHz)</option>
      <option value="mid">RACS-mid (1367.5 MHz)</option>
    </select>
    <div class="sep"></div>
    <button id="btnLoadSrc" disabled>Load sources</button>
    <select id="selCatalogue" disabled>
      <option value="">Select catalogue…</option>
    </select>
    <label>Min flux (mJy)</label>
    <input id="minFlux" type="number" min="0" step="0.1" value="0" style="width: 72px;" />
    <label>Src size</label>
    <input id="sourceSize" type="number" min="1" step="1" value="8" style="width: 48px;" />
    <div class="sep"></div>
    <button id="btnCircle">Circle: OFF</button>
    <label>r (°)</label>
    <input id="circleRadius" type="number" min="0.01" step="0.1" value="1.0" style="width: 60px;" />
    <div class="sep"></div>
    <button id="btnGrid">Grid: OFF</button>
    <label>nside</label>
    <input id="gridNside" type="number" min="1" step="1" value="64" style="width: 52px;" />
    <span id="status">Initializing…</span>
  </div>
  <div id="aladin">
  </div>

  <script src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js" charset="utf-8"></script>
  <script src="./app.js"></script>
</body>
</html>
